<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Sign In Replica</title>
    <link rel="stylesheet" href="prof.css">
</head>

<body>

    <header class="header">
        <div class="logo">
           <svg class="tds-icon" viewBox="0 0 342 35" xmlns="http://www.w3.org/2000/svg">
                    <path fill="currentColor"
                        d="M0 .1a9.7 9.7 0 0 0 7 7h11l.5.1v27.6h6.8V7.3L26 7h11a9.8 9.8 0 0 0 7-7H0zm238.6 0h-6.8v34.8H263a9.7 9.7 0 0 0 6-6.8h-30.3V0zm-52.3 6.8c3.6-1 6.6-3.8 7.4-6.9l-38.1.1v20.6h31.1v7.2h-24.4a13.6 13.6 0 0 0-8.7 7h39.9v-21h-31.2v-7zm116.2 28h6.7v-14h24.6v14h6.7v-21h-38zM85.3 7h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7m0 13.8h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7m0 14.1h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7M308.5 7h26a9.6 9.6 0 0 0 7-7h-40a9.6 9.6 0 0 0 7 7">
                    </path>
                </svg>
            
        </div>
        <div class="language-picker">
            <svg class="globe-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
            <span>IN</span>
        </div>
    </header>

    <main class="login-container">
        <h1>Sign In</h1>
        <form>
            <div class="input-group">
                <label for="email">Email <span class="info-icon">i</span></label>
                <input type="email" id="email" name="email">
            </div>
            <button type="submit" class="btn-primary">Next</button>
        </form>

        <div class="trouble-link">
            <a href="#">Trouble Signing In?</a>
        </div>

        <div class="divider">
            <span>Or</span>
        </div>

        <button class="btn-secondary">Create Account</button>
    </main>

    <footer class="site-footer">
        <ul class="footer-links">
            <li><a href="termpolicy.html">Tesla © 2026</a></li>
            <li><a href="privacy.html">Privacy &amp; Legal</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </footer>

</body>

</html>
